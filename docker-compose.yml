services:
  gatelet:
    build: .
    ports:
      - "127.0.0.1:4000:4000"  # MCP — localhost only (for host-based agents like Claude Code)
      - "127.0.0.1:4001:4001"  # Admin — localhost only
    volumes:
      - gatelet-data:/data
    environment:
      - GATELET_DATA_DIR=/data
      - GATELET_ADMIN_TOKEN=${GATELET_ADMIN_TOKEN}
      - GATELET_PASSPHRASE=${GATELET_PASSPHRASE}
    networks:
      - gatelet-internal
      - gatelet-egress
    restart: unless-stopped

networks:
  gatelet-internal:
    # Agent-facing: other containers on this network can reach :4000
    driver: bridge
  gatelet-egress:
    # Outbound: allows Gatelet to call external APIs (Google, etc.)
    driver: bridge

volumes:
  gatelet-data:
