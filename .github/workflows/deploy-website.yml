name: Deploy Website

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - 'install.sh'
      - 'assets/**'
      - '.github/workflows/deploy-website.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: |
          cd website
          npm install

      - name: Prepare install scripts
        run: |
          mkdir -p website/public
          cp install.sh website/public/install.sh
          cp install.ps1 website/public/install.ps1

      - name: Build Website
        run: |
          cd website
          npm run build

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: website/dist
          branch: gh-pages
