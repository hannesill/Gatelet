name: Deploy Website

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - 'install.sh'
      - 'install-host.sh'
      - 'assets/**'
      - '.github/workflows/deploy-website.yml'
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: |
          cd website
          npm install

      - name: Prepare install scripts
        run: |
          mkdir -p website/public
          cp install.sh website/public/install.sh
          cp install.ps1 website/public/install.ps1
          cp install-host.sh website/public/install-host.sh

      - name: Build Website
        run: |
          cd website
          npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
